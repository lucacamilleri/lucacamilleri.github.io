<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/logo.png">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="script.js"></script>
    <title>Luca Camilleri | Contact</title>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <a class="logo" href="index.html">Luca Camilleri</a>
    <button class="navbar-toggler" data-toggle="collapse" data-target="#navbarNav" type="button" onclick="animateBurger(this)">
      <div class="bar1"></div>
      <div class="bar2"></div>
      <div class="bar3"></div>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
              <a class="nav-link hover-underline-animation" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link hover-underline-animation" href="portfolio.html">Portfolio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link hover-underline-animation" href="contact.html">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link hover-underline-animation" href="design.html">Design</a>
            </li>
        </ul>
    </div>
  </nav>
  <div class="container">
    <h1>Contact Me</h1>
    <form method="post">
      <div class="form-group">
        <label for="name">First Name:</label>
        <input style="display: flex; float: left;"type="text" class="form-control" id="name" placeholder="Enter your name... e.g. John" name="name">
        <span id="nameCheck"></span>
      </div>
      <div class="form-group">
        <label for="surname">Surname:</label>
        <input type="text" class="form-control" id="surname" placeholder="Enter your surname... e.g. Doe" name="surname">
        <span id="surnameCheck"></span>
      </div>
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" class="form-control" id="email" placeholder="Enter your email... e.g. john.doe@gmail.com" name="email">
        <span id="emailCheck"></span>
      </div>
      <div class="form-group">
        <label for="message">Message:</label>
        <textarea class="form-control" id="message" placeholder="Enter your message here..." name="message"></textarea>
        <span id="messageCheck"></span>
      </div>
      <button type="submit" class="contactBtn primary whitetext">Submit</button>
    </form>
  </div>
</body>
<script>
  document.querySelector("form").addEventListener("submit", function(event) {
  var isValid = true;

  // Validate name
  var name = document.getElementById("name");
  var nameCheck = document.getElementById("nameCheck");
  if (name.value.trim() === "") {
    name.style.boxShadow = "0 1px 4px red";
    nameCheck.innerHTML = "❌";
    isValid = false;
  } else {
    name.style.boxShadow = "0 1px 4px green";
    nameCheck.innerHTML = "✅";
  }

  // Validate surname
  var surname = document.getElementById("surname");
  var surnameCheck = document.getElementById("surnameCheck");
  if (surname.value.trim() === "") {
    surname.style.boxShadow = "0 1px 4px red";
    surnameCheck.innerHTML = "❌";
    isValid = false;
  } else {
    surname.style.boxShadow = "0 1px 4px green";
    surnameCheck.innerHTML = "✅";
  }

  // Validate email
  var email = document.getElementById("email");
  var emailCheck = document.getElementById("emailCheck");
  if (email.value.trim() === "") {
    email.style.boxShadow = "0 1px 4px red";
    emailCheck.innerHTML = "❌";
    isValid = false;
  } else {
    email.style.boxShadow = "0 1px 4px green";
    emailCheck.innerHTML = "✅";
  }

  // Validate message
  var message = document.getElementById("message");
  var messageCheck = document.getElementById("messageCheck");
  if (message.value.trim() === "") {
    message.style.boxShadow = "0 1px 4px red";
    messageCheck.innerHTML = "❌";
    isValid = false;
  } else {
    message.style.boxShadow = "0 1px 4px green";
    messageCheck.innerHTML = "✅";
  }

  // If form is not valid, stop submission
  if (!isValid) {
    event.preventDefault();
  }
});
</script>
</html>
