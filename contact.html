<head>
    <meta charset="UTF-8">

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <title>Luca Camilleri | Contact</title>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <a class="logo" href="index.html">Luca Camilleri</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <i class="fa fa-bars"></i>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
              <a class="nav-link hover-underline-animation" href="index.html">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link hover-underline-animation" href="portfolio.html">Portfolio</a>
            </li>
            <li class="nav-item">
              <a class="nav-link hover-underline-animation" href="contact.html">Contact</a>
            </li>
            <li class="nav-item">
              <a class="nav-link hover-underline-animation" href="designpage.html">Design</a>
            </li>
        </ul>
    </div>
  </nav>
  <div class="container">
    <h2>Contact Me</h2>
    <form action="/submit_form" method="post">
      <div class="form-group">
        <label for="name">Name:</label>
        <input type="text" class="form-control" id="name" placeholder="Enter your name" name="name" required>
      </div>
      <div class="form-group">
        <label for="email">Email:</label>
        <input type="email" class="form-control" id="email" placeholder="Enter your email" name="email" required>
      </div>
      <div class="form-group">
        <label for="message">Message:</label>
        <textarea class="form-control" id="message" placeholder="Enter your message" name="message" required></textarea>
      </div>
      <button type="submit" class="btn primary whitetext bold">Submit</button>
    </form>
  </div>
</body>
</html>
